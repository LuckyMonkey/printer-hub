version: "3.9"

services:
  printer-hub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: printer-hub
    restart: unless-stopped
    privileged: true
    ports:
      - "8088:80"
      - "8631:631"
    environment:
      TZ: America/New_York
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_NAME: printerhub
      DB_USER: printerhub
      DB_PASSWORD: printerhub
      API_RATE_LIMIT_PER_MIN: "${API_RATE_LIMIT_PER_MIN:-60}"
      PRINT_ERROR_HISTORY_LIMIT: "${PRINT_ERROR_HISTORY_LIMIT:-20}"
      PRINT_SOCKET_TIMEOUT_SEC: "${PRINT_SOCKET_TIMEOUT_SEC:-4}"
      PRINT_JOB_LOG_PATH: "${PRINT_JOB_LOG_PATH:-/var/log/printer-hub/print-jobs.log}"
      BROTHER_MODE: "${BROTHER_MODE:-template}"
      BROTHER_TRANSPORT: "${BROTHER_TRANSPORT:-socket}"
      BROTHER_HOST: "${BROTHER_HOST:-127.0.0.1}"
      BROTHER_PORT: "${BROTHER_PORT:-9100}"
      ZEBRA_TRANSPORT: "${ZEBRA_TRANSPORT:-cups}"
      ZEBRA_HOST: "${ZEBRA_HOST:-127.0.0.1}"
      ZEBRA_PORT: "${ZEBRA_PORT:-9100}"
      PRINTER_BROTHER_QUEUE: "${PRINTER_BROTHER_QUEUE:-brother_ql820nwb}"
      PRINTER_ZEBRA_QUEUE: "${PRINTER_ZEBRA_QUEUE:-zebra_zp505}"
      PRINTER_HP_QUEUE: "${PRINTER_HP_QUEUE:-hp_envy_5055}"
      GAPPS_WEBHOOK_URL: "${GAPPS_WEBHOOK_URL:-https://script.google.com/macros/s/AKfycbxYp38eQHAGOCK57klv5FxBJur5MOyJlQ_uXQ5ITMtZcboAtr0Q7-Gy0EasOtc-G0aq/exec}"
      SITE_LAT: ""
      SITE_LON: ""
    devices:
      - "/dev/bus/usb:/dev/bus/usb"
    volumes:
      - cups_etc:/etc/cups
      - cups_spool:/var/spool/cups
      - cups_logs:/var/log/cups
      - printer_data:/var/lib/printer-hub
      - pg_data:/var/lib/postgresql

volumes:
  cups_etc:
  cups_spool:
  cups_logs:
  printer_data:
  pg_data:
